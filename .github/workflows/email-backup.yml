name: Email CSV Backup

on:
  schedule:
    - cron: '0 11 5,10,15,25,30 * *'
  workflow_dispatch:

jobs:
  send-backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send CSV email
        env:
          FIREBASE_URL: https://bda-controle-missoes-default-rtdb.firebaseio.com/bda_data.json
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_TO: e4bdaamv@gmail.com
        run: node scripts/send-csv-email.js
