name: Send CSV Email (25th monthly)

on:
  schedule:
    - cron: '0 11 25 * *'
  workflow_dispatch:

jobs:
  send-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch data and send email
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FIREBASE_URL: https://bda-controle-missoes-default-rtdb.firebaseio.com/bda_data.json
          EMAIL_TO: luis19730@gmail.com
        run: node scripts/send-csv-email.js
